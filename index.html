<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能工具箱</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂捲軸樣式，讓側邊欄更美觀 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* 隱藏數字輸入框的上下箭頭，讓畫面更簡潔 */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden relative">

    <aside id="main-sidebar"

            <button id="close-sidebar-btn" class="absolute top-6 right-4 text-slate-400 hover:text-white lg:hidden">
                ✖

            <p class="text-slate-400 text-sm mt-2 mb-4">實用工具集</p>

            <button

            <button

    <main class="flex-1 flex flex-col h-full relative overflow-y-auto bg-gray-50 min-w-0">

            <div class="flex items-center gap-3 md:gap-6 ml-auto">

                <div class="flex items-center gap-2">

                        class="w-8 h-8 md:w-9 md:h-9 hover:scale-110 transition-transform rounded-full overflow-hidden shadow-sm"

                    </button>
                    <button onclick="shareTo('line')"
                        class="w-8 h-8 md:w-9 md:h-9 hover:scale-110 transition-transform rounded-full overflow-hidden shadow-sm"

                    </button>
                    <button onclick="shareTo('threads')"
                        class="w-8 h-8 md:w-9 md:h-9 hover:scale-110 transition-transform rounded-full overflow-hidden shadow-sm"

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // 1. Google Sheets 計數與追蹤 API (極速優化版)
            // ==========================================
            const GAS_URL = "https://script.google.com/macros/s/AKfycbwErP5VVl_6vI29OiH4BAfmvCwC2eYmO5QrvK-BKYmYz1M6dCGyIffxmQgFwKzZlKs/exec";
            const counterElement = document.getElementById('site-view-counter');

            // 技巧 1：0 秒顯示！先從瀏覽器本地抓取上次的紀錄墊檔
            let cachedViews = localStorage.getItem('site_total_views');
            if (cachedViews) {
                counterElement.value = cachedViews;
            } else {
                // 如果是第一次來，顯示三個點避免顯示 0 產生錯覺
                counterElement.type = "text";
                counterElement.value = "...";
            }

            // 技巧 2：極速讀取最新人數 (不寫入，速度快)
            async function fetchFastTotalViews() {
                try {
                    const res = await fetch(GAS_URL); // 發送 GET 請求
                    const data = await res.json();
                    if (data.totalViews !== undefined) {
                        counterElement.type = "number"; // 切換回數字格式
                        counterElement.value = data.totalViews;
                        // 更新本地暫存
                        localStorage.setItem('site_total_views', data.totalViews);
                    }
                } catch (err) {
                    console.error("快速讀取人數失敗", err);
                }
            }

            // 取得使用者 IP
            async function getIP() {
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    return data.ip;
                } catch (e) {
                    return '未知 IP';
                }
            }

            // 技巧 3：背景默默寫入造訪紀錄 (不卡畫面)
            async function recordVisit() {
                const ip = await getIP(); // 等待 IP 需要時間

                // ★新增：檢查網址有沒有夾帶分享來源標籤 (例如 ?ref=fb)
                const urlParams = new URLSearchParams(window.location.search);
                const trafficSource = urlParams.get('ref') || 'direct'; // 如果沒有標籤，就是 direct(直接造訪)

                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action: 'visit',
                            ip: ip,
                            userAgent: navigator.userAgent,
                            ref: trafficSource // ★將來源傳送給 Google Apps Script
                        })
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        counterElement.value = result.totalViews;
                        localStorage.setItem('site_total_views', result.totalViews);
                    }
                } catch (err) {
                    console.error("無法連線至計數器 API", err);
                }
            }

            // 綁定廣告點擊事件 (背景發送資料給試算表，不影響網頁跳轉)
            document.querySelectorAll('.ad-link').forEach(ad => {
                ad.addEventListener('click', async (e) => {
                    const ip = await getIP();
                    const adId = ad.getAttribute('data-ad-id') || ad.href;
                    try {
                        fetch(GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({
                                action: 'click',
                                ip: ip,
                                adId: adId
                            })
                        });
                    } catch (err) {
                        console.error("廣告追蹤失敗", err);
                    }
                });
            });

            // 【雙管齊下同時啟動】
            // 1. 馬上抓最新數字更新畫面 (快)
            fetchFastTotalViews();
            // 2. 在背景慢慢抓IP並把資料寫入試算表 (慢)
            recordVisit();

            // ==========================================
            // 2. 原本的介面邏輯 (側邊欄、篩選器)
            // ==========================================
            const nav = document.getElementById('menu-nav');
            const overviewGrid = document.getElementById('overview-grid');
            const categoryFilters = document.getElementById('category-filters');
            const homeView = document.getElementById('home-view');
            const toolContainer = document.getElementById('tool-container');
            const currentToolTitle = document.getElementById('current-tool-title');
            const goHomeBtn = document.getElementById('goHome');

            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('main-sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const closeSidebarBtn = document.getElementById('close-sidebar-btn');

            function toggleSidebar() {
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebarOverlay.classList.remove('hidden');
                    setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
                } else {
                    sidebar.classList.add('-translate-x-full');
                    sidebarOverlay.classList.add('opacity-0');
                    setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
                }
            }

            mobileMenuBtn.addEventListener('click', toggleSidebar);
            closeSidebarBtn.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);

            let categories = [];
            let currentCategory = null;

            Array.from(nav.children).forEach(el => {
                if ((el.tagName === 'DIV' && el.classList.contains('text-xs')) ||
                    (el.tagName === 'DIV' && el.querySelector('.uppercase'))) {

                    let title = el.innerText.trim();
                    if (title.includes('🔥')) title = '🔥 熱門工具';

                    currentCategory = { title: title, tools: [] };
                    categories.push(currentCategory);
                } else if (el.tagName === 'BUTTON' && currentCategory && el.hasAttribute('data-tool')) {
                    currentCategory.tools.push({
                        id: el.getAttribute('data-tool'),
                        name: el.innerText.trim()
                    });
                }
            });

            categories.forEach((cat) => {
                if (cat.tools.length === 0) return;

                const filterBtn = document.createElement('button');
                filterBtn.className = 'px-4 py-1.5 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 hover:text-slate-900 transition filter-btn whitespace-nowrap';
                filterBtn.innerText = cat.title.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\s/g, '').replace('熱門工具', '🔥 熱門');
                filterBtn.dataset.filter = cat.title;
                categoryFilters.appendChild(filterBtn);

                const section = document.createElement('div');
                section.className = 'category-section';
                section.dataset.category = cat.title;

                const titleHtml = `<h3 class="text-lg font-bold text-slate-800 mb-4 border-l-4 border-emerald-400 pl-3">${cat.title}</h3>`;

                let cardsHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4">`;
                cat.tools.forEach(tool => {
                    cardsHtml += `
                        <button class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-400 text-left transition group overview-tool-btn flex items-center justify-between" data-target="${tool.id}">
                            <div class="font-medium text-slate-700 group-hover:text-emerald-600 transition truncate pr-2">${tool.name}</div>
                            <span class="text-slate-300 group-hover:text-emerald-400 transition transform group-hover:translate-x-1 shrink-0">➔</span>
                        </button>
                    `;
                });
                cardsHtml += `</div>`;

                section.innerHTML = titleHtml + cardsHtml;
                overviewGrid.appendChild(section);
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-emerald-600', 'text-white', 'shadow-sm', 'border-transparent');
                        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                    });
                    e.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                    e.target.classList.add('bg-emerald-600', 'text-white', 'shadow-sm', 'border-transparent');

                    const filterValue = e.target.dataset.filter;
                    document.querySelectorAll('.category-section').forEach(section => {
                        if (filterValue === 'all' || section.dataset.category === filterValue) {
                            section.style.display = 'block';
                            section.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300 });
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });

            document.querySelectorAll('.overview-tool-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.dataset.target;
                    const sideBarBtn = document.querySelector(`nav button[data-tool="${targetId}"]`);
                    if (sideBarBtn) {
                        sideBarBtn.click();
                        homeView.style.display = 'none';
                        toolContainer.classList.remove('hidden');
                    }
                });
            });

            goHomeBtn.addEventListener('click', () => {
                currentToolTitle.innerText = '首頁：工具總覽目錄';
                toolContainer.classList.add('hidden');
                homeView.style.display = 'block';

                document.querySelectorAll('#menu-nav button').forEach(b => {
                    b.classList.remove('active-menu', 'bg-slate-700', 'text-emerald-400');
                    b.classList.add('text-slate-300');
                });

                if (window.innerWidth < 1024) toggleSidebar();
            });

            nav.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' && e.target.hasAttribute('data-tool')) {
                    homeView.style.display = 'none';
                    toolContainer.classList.remove('hidden');
                    if (window.innerWidth < 1024) toggleSidebar();
                }
            });

            // ==========================================
            // 3. 社群分享功能 (新增紀錄與標籤追蹤)
            // ==========================================
            window.shareTo = async function (platform) {
                // ★背景發送 API 記錄分享動作
                getIP().then(ip => {
                    fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'share', ip: ip, platform: platform })
                    }).catch(err => console.error("紀錄分享失敗", err));
                });

                // ★動態幫網址加上 ?ref=platform
                const shareUrlObj = new URL(window.location.href);
                shareUrlObj.searchParams.set('ref', platform);

                // 使用帶有來源標記的新網址來分享
                const currentUrl = encodeURIComponent(shareUrlObj.toString());
                const title = encodeURIComponent(document.title);

                if (platform === 'fb') {
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`, '_blank', 'width=600,height=400');
                } else if (platform === 'line') {
                    window.open(`https://social-plugins.line.me/lineit/share?url=${currentUrl}`, '_blank');
                } else if (platform === 'threads') {
                    window.open(`https://threads.net/intent/post?text=${title}%20${currentUrl}`, '_blank');
                } else if (['ig', 'tiktok', 'xhs'].includes(platform)) {
                    navigator.clipboard.writeText(shareUrlObj.toString()).then(() => {
                        const platformName = platform === 'ig' ? 'Instagram' : (platform === 'tiktok' ? '抖音' : '小紅書');
                        alert(`✅ 已複製網站連結！\n請開啟 ${platformName} APP 貼上連結與朋友分享。`);
                    }).catch(err => {
                        console.error('複製失敗', err);
                        alert('複製失敗，請手動複製網址分享！');
                    });
                }
            };

        }); // <--- 💡 把原本在上面的 DOMContentLoaded 結尾 `});` 移到這裡！
    </script>
