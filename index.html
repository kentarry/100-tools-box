<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 in 1 超級前端工具箱</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-xl z-20">
        <div class="p-6 pb-4">
            <h1 class="text-2xl font-bold tracking-wider">🛠️ 萬能工具箱</h1>
            <p class="text-slate-400 text-sm mt-2 mb-4">100 in 1 實用工具集</p>

            <div class="relative">
                <input type="text" id="toolSearch" placeholder="搜尋工具..."
                    class="w-full bg-slate-800 text-white text-sm rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-emerald-500 transition">
            </div>

            <button id="goHome"
                class="w-full mt-4 flex items-center justify-center gap-2 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition">
                <span>🏠</span> 工具總覽目錄
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto px-4 space-y-2 pb-6 custom-scrollbar" id="menu-nav">
            
            <div class="text-sm font-bold text-amber-400 uppercase tracking-wider mb-2 mt-2 flex items-center gap-2">
                🔥 熱門常用工具
            </div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700 active-menu" data-tool="removeBg">高級去背上色機</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="jsonTool">JSON 格式化</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="passwordGen">強密碼產生</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="ipChecker">我的 IP 查詢</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="wifiQRGen">WiFi 連線 QR</button>

            <div class="my-4 border-t border-slate-700"></div>

            <div class="text-sm font-bold text-emerald-400 uppercase tracking-wider mb-2 mt-4 flex items-center gap-2">
                📂 其他分類工具
            </div>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-4">影像處理類</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="watermark">機密防盜浮水印</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="colorPicker">圖片色碼擷取</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="photoCropper">黃金比例裁切</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="heicConverter">HEIC 轉 JPG</button>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6">隱私與安全防護</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="pwdChecker">密碼外洩檢查器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="emailObfuscator">Email 防搜刮混淆</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="burnMessage">純前端加密訊息</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="passwordEntropy">密碼強度試算</button>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6">文書與排版處理</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="signaturePad">手寫簽名產生器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="panguSpacing">盤古之白排版器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="textDecoder">亂碼編碼還原器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="capitalNumber">大寫金額轉換器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="redundancyFilter">廢話過濾檢查器</button>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6">開發與轉換工具</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="base64Tool">Base64 編碼</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="htmlEntities">HTML 實體轉碼</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="mdPreview">MD 預覽器</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="cleanUrl">網址清洗</button>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6">硬體與測試</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="displayTester">螢幕壞點檢測</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="mouseTester">滑鼠連點測試</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="keyboardTester">鍵盤按鍵測試</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="screenInfo">螢幕檢測</button>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6">更多其他工具</div>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="expenseSplitter">多人分帳計算</button>
            <button class="w-full text-left px-4 py-3 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700" data-tool="loanCalculator">提前還款試算</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-y-auto bg-slate-50">
        <header class="bg-white shadow-sm px-8 py-6 sticky top-0 z-10 flex justify-between items-center">
            <h2 id="current-tool-title" class="text-2xl font-bold text-slate-800">工具總覽目錄</h2>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full" id="tool-container">
            
            <div id="overview-dashboard" class="space-y-8">
                
                <section>
                    <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span>🔥</span> 熱門常用工具
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer hover:border-emerald-500" onclick="document.querySelector('[data-tool=\'removeBg\']').click()">
                            <h4 class="font-bold text-slate-800">高級去背上色機</h4>
                            <p class="text-sm text-slate-500 mt-1">AI 智慧去除圖片背景</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer hover:border-emerald-500" onclick="document.querySelector('[data-tool=\'jsonTool\']').click()">
                            <h4 class="font-bold text-slate-800">JSON 格式化</h4>
                            <p class="text-sm text-slate-500 mt-1">快速排版與驗證 JSON</p>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer hover:border-emerald-500" onclick="document.querySelector('[data-tool=\'passwordGen\']').click()">
                            <h4 class="font-bold text-slate-800">強密碼產生</h4>
                            <p class="text-sm text-slate-500 mt-1">一鍵生成高安全性密碼</p>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span class="text-emerald-500">■</span> 影像處理與急救
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer" onclick="document.querySelector('[data-tool=\'watermark\']').click()">
                            <h4 class="font-bold text-slate-800">機密防盜浮水印</h4>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer" onclick="document.querySelector('[data-tool=\'heicConverter\']').click()">
                            <h4 class="font-bold text-slate-800">HEIC 轉 JPG</h4>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer" onclick="document.querySelector('[data-tool=\'photoCropper\']').click()">
                            <h4 class="font-bold text-slate-800">黃金比例裁切</h4>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span class="text-blue-500">■</span> 隱私與安全防護
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer">
                            <h4 class="font-bold text-slate-800">密碼外洩檢查器</h4>
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition cursor-pointer">
                            <h4 class="font-bold text-slate-800">純前端加密訊息</h4>
                        </div>
                    </div>
                </section>

                </div>
            </div>
    </main>

    <script src="tools/watermark.js"></script>
    <script src="app.js"></script>
</body>

</html>
