    <script>
        // 為了讓點擊工具後自動隱藏首頁目錄，並在點擊 "首頁" 時恢復
        document.addEventListener('DOMContentLoaded', () => {
            const homeOverview = document.getElementById('home-overview');
            const toolContainer = document.getElementById('tool-container');
            const goHomeBtn = document.getElementById('goHome');
            
            // 監聽所有帶有 data-tool 的按鈕
            document.querySelectorAll('[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    homeOverview.style.display = 'none'; // 隱藏總覽目錄
                    toolContainer.style.display = 'block'; // 顯示工具區
                });
            });

            // 點擊返回首頁目錄按鈕
            if (goHomeBtn) {
                goHomeBtn.addEventListener('click', () => {
                    homeOverview.style.display = 'block'; // 顯示總覽目錄
                    toolContainer.style.display = 'none'; // 隱藏工具區
                    document.getElementById('current-tool-title').textContent = '首頁：工具總覽目錄';
                });
            }
        });
    </script>
