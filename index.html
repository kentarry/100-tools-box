<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 in 1 超級前端工具箱</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂捲軸樣式，讓側邊欄更美觀 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden relative">

    <div id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity opacity-0"></div>

    <aside id="main-sidebar"
        class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-xl z-50 absolute lg:relative transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 pb-2 relative">
            <button id="close-sidebar-btn" class="absolute top-6 right-4 text-slate-400 hover:text-white lg:hidden">
                ✖
            </button>

            <h1 class="text-2xl font-bold tracking-wider">🛠️ 萬能工具箱</h1>
            <p class="text-slate-400 text-sm mt-2 mb-4">100 in 1 實用工具集</p>

            <div class="relative">
                <input type="text" id="toolSearch" placeholder="搜尋工具..."

            </div>

            <button id="goHome"
                class="w-full mt-4 flex items-center justify-center gap-2 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition shadow-lg">
                <span>🏠</span> 工具總覽目錄
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto px-4 space-y-1 pb-6 custom-scrollbar" id="menu-nav">

            <div class="sticky top-0 bg-slate-900 pt-4 pb-2 z-10">

                    class="text-sm font-bold text-emerald-400 flex items-center gap-2 mb-1 px-2 uppercase tracking-wider">
                    <span>🔥</span> 多人使用 / 熱門
                </div>
            </div>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="removeBg">高級去背上色機</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="jsonTool">JSON 格式化</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="passwordGen">強密碼產生</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="ipChecker">我的 IP 查詢</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="wifiQRGen">WiFi 連線 QR</button>

            <div class="my-6 border-t border-slate-700 mx-2"></div>

            <div class="text-sm font-bold text-slate-300 flex items-center gap-2 mb-4 px-2">
                <span>📁</span> 全部分類目錄
            </div>

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-4 px-2">開發與網頁輔助</div>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="base64Tool">Base64 編碼</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="htmlEntities">HTML 實體轉碼</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="mdPreview">MD 預覽器</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="cleanUrl">網址清洗</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">隱私與資訊安全</div>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="pwdChecker">密碼外洩檢查器</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="passwordEntropy">密碼強度試算</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="emailObfuscator">Email 防搜刮混淆</button>
            <button

            <button

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">影像與色彩處理</div>
            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <button

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">健康與生活管理</div>

            <button

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button

            <button

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">電腦硬體與檢測</div>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"
                data-tool="displayTester">螢幕壞點檢測</button>
            <button
                class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 font-medium transition hover:bg-slate-700"

            <button

            <button

            <button

            <button

                <h2 id="current-tool-title" class="text-lg md:text-xl font-bold text-slate-800 truncate">首頁：工具總覽目錄</h2>
            </div>

            <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                <span class="text-sm">👀</span>
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 leading-none font-bold">總點閱觀看</span>
                    <span id="site-view-counter" class="text-sm font-bold text-emerald-600 leading-none mt-0.5">0</span>
                </div>
            </div>
        </header>

        <div id="home-view" class="py-4 md:py-8 pl-4 md:pl-8 pr-0 w-full block">
            <div class="flex flex-col lg:flex-row gap-8 items-start relative w-full justify-between">

                <div class="flex-1 w-full min-w-0 pr-4 md:pr-8 lg:pr-8 max-w-[1400px]">
                    <div id="category-filters" class="flex flex-wrap gap-2 mb-8 border-b pb-6 border-gray-200">
                        <button
                            class="px-4 py-1.5 rounded-full text-sm font-medium bg-emerald-600 text-white shadow-sm hover:bg-emerald-500 transition filter-btn"
                            data-filter="all">顯示全部</button>
                    </div>

                    <div id="overview-grid" class="space-y-10">
                    </div>
                </div>

                <aside class="hidden lg:flex flex-col gap-4 w-[160px] shrink-0 sticky top-24 ml-auto right-0">

                    <a href="https://www-twtest.towergame.com/Games/Freeplay/Bank/index.aspx?q_strAppID=com.igs.mjstar31official"
                        target="_blank"
                        class="block w-full bg-white rounded-md shadow-sm border border-slate-200 hover:shadow-md transition transform hover:-translate-y-1 overflow-hidden group">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLxNTOobT4guDnZL7VmtiZHXxa5yUc1ofYWA&s"
                            alt="廣告 1" class="w-full h-auto object-cover opacity-90 group-hover:opacity-100 transition">
                    </a>

                    <a href="https://www-twtest.towergame.com/Games/tmd/index.aspx" target="_blank"
                        class="block w-full bg-white rounded-md shadow-sm border border-slate-200 hover:shadow-md transition transform hover:-translate-y-1 overflow-hidden group">
                        <img src="https://megapx-assets.dcard.tw/images/730bbf22-ee41-427f-9276-08884c1c6166/640.jpeg"
                            alt="廣告 2" class="w-full h-auto object-cover opacity-90 group-hover:opacity-100 transition">
                    </a>

                    <a href="https://www-twtest.towergame.com/index.aspx" target="_blank"
                        class="block w-full bg-white rounded-md shadow-sm border border-slate-200 hover:shadow-md transition transform hover:-translate-y-1 overflow-hidden group">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQYbloAiwy9LeYlP7L0PocbF9h1uUc-12bpdQ&s"
                            alt="廣告 3" class="w-full h-auto object-cover opacity-90 group-hover:opacity-100 transition">
                    </a>

                </aside>

            </div>
        </div>
        <div class="p-4 md:p-8 max-w-7xl mx-auto w-full hidden" id="tool-container">
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -- 觀看人數計數器邏輯 (前端模擬) --
            const counterElement = document.getElementById('site-view-counter');
            let currentViews = localStorage.getItem('global_site_views');
            if (!currentViews) currentViews = 0;

            currentViews = parseInt(currentViews) + 1;
            localStorage.setItem('global_site_views', currentViews);

            counterElement.innerText = currentViews.toLocaleString();

            // -- 原有與 RWD 介面邏輯 --
            const nav = document.getElementById('menu-nav');
            const overviewGrid = document.getElementById('overview-grid');
            const categoryFilters = document.getElementById('category-filters');
            const homeView = document.getElementById('home-view');
            const toolContainer = document.getElementById('tool-container');
            const currentToolTitle = document.getElementById('current-tool-title');
            const goHomeBtn = document.getElementById('goHome');

            // 手機版側邊欄控制
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('main-sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const closeSidebarBtn = document.getElementById('close-sidebar-btn');

            function toggleSidebar() {
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebarOverlay.classList.remove('hidden');
                    setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
                } else {
                    sidebar.classList.add('-translate-x-full');
                    sidebarOverlay.classList.add('opacity-0');
                    setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
                }
            }

            mobileMenuBtn.addEventListener('click', toggleSidebar);
            closeSidebarBtn.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);


            let categories = [];
            let currentCategory = null;

            Array.from(nav.children).forEach(el => {
                if ((el.tagName === 'DIV' && el.classList.contains('text-xs')) ||
                    (el.tagName === 'DIV' && el.querySelector('.uppercase'))) {

                    let title = el.innerText.trim();
                    if (title.includes('🔥')) title = '🔥 熱門工具';

                    currentCategory = { title: title, tools: [] };
                    categories.push(currentCategory);
                } else if (el.tagName === 'BUTTON' && currentCategory && el.hasAttribute('data-tool')) {
                    currentCategory.tools.push({
                        id: el.getAttribute('data-tool'),
                        name: el.innerText.trim()
                    });
                }
            });

            categories.forEach((cat) => {
                if (cat.tools.length === 0) return;

                const filterBtn = document.createElement('button');
                filterBtn.className = 'px-4 py-1.5 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 hover:text-slate-900 transition filter-btn whitespace-nowrap';
                filterBtn.innerText = cat.title.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\s/g, '').replace('熱門工具', '🔥 熱門');
                filterBtn.dataset.filter = cat.title;
                categoryFilters.appendChild(filterBtn);

                const section = document.createElement('div');
                section.className = 'category-section';
                section.dataset.category = cat.title;

                const titleHtml = `<h3 class="text-lg font-bold text-slate-800 mb-4 border-l-4 border-emerald-400 pl-3">${cat.title}</h3>`;

                let cardsHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4">`;
                cat.tools.forEach(tool => {
                    cardsHtml += `
                        <button class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-400 text-left transition group overview-tool-btn flex items-center justify-between" data-target="${tool.id}">
                            <div class="font-medium text-slate-700 group-hover:text-emerald-600 transition truncate pr-2">${tool.name}</div>
                            <span class="text-slate-300 group-hover:text-emerald-400 transition transform group-hover:translate-x-1 shrink-0">➔</span>
                        </button>
                    `;
                });
                cardsHtml += `</div>`;

                section.innerHTML = titleHtml + cardsHtml;
                overviewGrid.appendChild(section);
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-emerald-600', 'text-white', 'shadow-sm', 'border-transparent');
                        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                    });
                    e.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                    e.target.classList.add('bg-emerald-600', 'text-white', 'shadow-sm', 'border-transparent');

                    const filterValue = e.target.dataset.filter;
                    document.querySelectorAll('.category-section').forEach(section => {
                        if (filterValue === 'all' || section.dataset.category === filterValue) {
                            section.style.display = 'block';
                            section.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300 });
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });

            document.querySelectorAll('.overview-tool-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.dataset.target;
                    const sideBarBtn = document.querySelector(`nav button[data-tool="${targetId}"]`);
                    if (sideBarBtn) {
                        sideBarBtn.click();
                        homeView.style.display = 'none';
                        toolContainer.classList.remove('hidden');
                    }
                });
            });

            goHomeBtn.addEventListener('click', () => {
                currentToolTitle.innerText = '首頁：工具總覽目錄';
                toolContainer.classList.add('hidden');
                homeView.style.display = 'block';

                document.querySelectorAll('#menu-nav button').forEach(b => {
                    b.classList.remove('active-menu', 'bg-slate-700', 'text-emerald-400');
                    b.classList.add('text-slate-300');
                });

                if (window.innerWidth < 1024) toggleSidebar();
            });

            nav.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' && e.target.hasAttribute('data-tool')) {
                    homeView.style.display = 'none';
                    toolContainer.classList.remove('hidden');
                    if (window.innerWidth < 1024) toggleSidebar();
                }
            });
        });
    </script>

    <script src="app.js"></script>
</body>

</html>
